# Creates the database tables (prisma migrate deploy) using the Docker Hub image.
# Re-run later with: kubectl -n inday delete job inday-migrate ; kubectl apply -f 30-migrate-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: inday-migrate
  namespace: inday
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: mittaldocker124/inday:v1
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: inday-secrets
