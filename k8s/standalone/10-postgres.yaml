# PostgreSQL running INSIDE the cluster — this is the database the app uses.
# Data is kept on a PersistentVolumeClaim so it survives pod restarts.
# (For a single learning server this is fine; for serious production use AWS RDS.)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: inday
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: inday
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: inday
            - name: POSTGRES_PASSWORD
              value: inday
            - name: POSTGRES_DB
              value: inday
            # Lets the DB initialise on the mounted volume's subdir.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "inday", "-d", "inday"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: inday
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
