# The app itself, exposed on the EC2 public IP via k3s's built-in LoadBalancer
# (ServiceLB) on port 80. Pulls the image from Docker Hub.
# replicas stays 1 — chat WebSocket rooms are in-process memory.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inday-web
  namespace: inday
  labels:
    app: inday
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inday
  template:
    metadata:
      labels:
        app: inday
    spec:
      containers:
        - name: web
          image: mittaldocker124/inday:v1
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: inday-secrets
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 15
---
# type: LoadBalancer => k3s's built-in load balancer (ServiceLB) exposes this on
# the EC2 node's port 80. With >1 replica it would balance across pods.
apiVersion: v1
kind: Service
metadata:
  name: inday-web
  namespace: inday
spec:
  type: LoadBalancer
  selector:
    app: inday
  ports:
    - port: 80
      targetPort: http
