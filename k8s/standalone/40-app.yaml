# The app itself, exposed on the EC2 public IP via a NodePort (port 30080).
# Uses the locally-built image (imagePullPolicy: Never).
# replicas stays 1 — chat WebSocket rooms are in-process memory.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inday-web
  namespace: inday
  labels:
    app: inday
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inday
  template:
    metadata:
      labels:
        app: inday
    spec:
      containers:
        - name: web
          image: inday:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: inday-secrets
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: inday-web
  namespace: inday
spec:
  type: NodePort
  selector:
    app: inday
  ports:
    - port: 80
      targetPort: http
      nodePort: 30080
