# App secrets. DATABASE_URL points at the in-cluster "postgres" Service (10-postgres.yaml).
# Replace AUTH_SECRET / NEXTAUTH_SECRET with: openssl rand -base64 32
# Set NEXTAUTH_URL to http://<EC2_PUBLIC_IP>:30080  (the NodePort below).
apiVersion: v1
kind: Secret
metadata:
  name: inday-secrets
  namespace: inday
type: Opaque
stringData:
  DATABASE_URL: "postgresql://inday:inday@postgres:5432/inday?schema=public"
  AUTH_SECRET: "CHANGE_ME_run_openssl_rand_base64_32"
  NEXTAUTH_SECRET: "CHANGE_ME_run_openssl_rand_base64_32"
  NEXTAUTH_URL: "http://EC2_PUBLIC_IP:30080"
  CLOUDINARY_CLOUD_NAME: ""
  CLOUDINARY_API_KEY: ""
  CLOUDINARY_API_SECRET: ""
