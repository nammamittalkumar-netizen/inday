# Template only — DO NOT COMMIT REAL SECRETS.
# Copy to secret.yaml, fill in values, and apply (or better: create from the CLI
# / pull from AWS Secrets Manager via External Secrets Operator).
#
# Quick create from the CLI instead of this file:
#   kubectl -n inday create secret generic inday-secrets \
#     --from-literal=DATABASE_URL='postgresql://user:pass@<rds-host>:5432/inday?schema=public&sslmode=require' \
#     --from-literal=AUTH_SECRET='<openssl rand -base64 32>' \
#     --from-literal=NEXTAUTH_SECRET='<same or another 32+ byte secret>' \
#     --from-literal=NEXTAUTH_URL='https://inday.example.com' \
#     --from-literal=CLOUDINARY_CLOUD_NAME='<cloud-name>' \
#     --from-literal=CLOUDINARY_API_KEY='<api-key>' \
#     --from-literal=CLOUDINARY_API_SECRET='<api-secret>'
apiVersion: v1
kind: Secret
metadata:
  name: inday-secrets
  namespace: inday
type: Opaque
stringData:
  # Postgres (RDS). Use sslmode=require for RDS.
  DATABASE_URL: "postgresql://USER:PASSWORD@RDS_HOST:5432/inday?schema=public&sslmode=require"
  # NextAuth v5 signing secret. Generate with: openssl rand -base64 32
  AUTH_SECRET: "REPLACE_ME"
  NEXTAUTH_SECRET: "REPLACE_ME"
  # Public origin used for auth callbacks. Must match the Ingress host.
  NEXTAUTH_URL: "https://inday.example.com"
  # Cloudinary image uploads.
  CLOUDINARY_CLOUD_NAME: "REPLACE_ME"
  CLOUDINARY_API_KEY: "REPLACE_ME"
  CLOUDINARY_API_SECRET: "REPLACE_ME"
